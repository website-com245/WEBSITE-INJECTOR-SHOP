<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Manager - Injector Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Same styles as seller-approve.html + Key specific */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); 
            color: white; min-height: 100vh; overflow-x: hidden; 
        }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .header {
            background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
            padding: 2rem 2.5rem; border-bottom: 1px solid rgba(51,65,85,0.5);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 2.5rem; display: flex; align-items: center; gap: 1rem; }
        .back-btn { 
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; 
            padding: 1rem 2rem; border-radius: 16px; text-decoration: none; 
            font-weight: 600; transition: all 0.3s; box-shadow: 0 10px 30px rgba(59,130,246,0.4);
        }
        
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 2rem; padding: 2.5rem; max-width: 1400px; margin: 0 auto;
        }
        .stat-card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            border-radius: 24px; padding: 2rem; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.4s;
        }
        .stat-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .stat-icon { font-size: 3rem; margin-bottom: 1rem; }
        .stat-number { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        
        .tabs {
            max-width: 1400px; margin: 0 auto 2rem; padding: 0 2.5rem;
            display: flex; gap: 1rem; background: rgba(255,255,255,0.08);
            border-radius: 16px; padding: 0.5rem; backdrop-filter: blur(20px);
        }
        .tab-btn {
            flex: 1; padding: 1rem 2rem; border-radius: 12px; border: none;
            background: transparent; color: #94a3b8; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active { background: linear-gradient(135deg, #10b981, #34d399); color: white; }
        
        .keys-grid {
            max-width: 1400px; margin: 0 auto; padding: 0 2.5rem 3rem;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
        }
        .product-section {
            background: rgba(255,255,255,0.95); border-radius: 24px;
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(226,232,240,0.5); color: #1e293b;
        }
        .product-header {
            padding: 1.5rem 2rem; background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; display: flex; justify-content: space-between; align-items: center;
        }
        .key-list {
            max-height: 400px; overflow-y: auto;
        }
        .key-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem; border-bottom: 1px solid #f1f5f9;
            transition: all 0.3s;
        }
        .key-row:hover { background: #f8fafc; }
        .key-row:last-child { border-bottom: none; }
        
        .key-code {
            font-family: 'Courier New', monospace; font-size: 1rem;
            font-weight: 600; letter-spacing: 1px; background: #f1f5f9;
            padding: 0.5rem 1rem; border-radius: 8px; min-width: 200px;
        }
        .key-status {
            padding: 0.25rem 1rem; border-radius: 20px; font-size: 0.8rem;
            font-weight: 600;
        }
        .status-available { background: #d1fae5; color: #059669; }
        .status-used { background: #dbeafe; color: #2563eb; }
        .status-blocked { background: #fee2e2; color: #dc2626; }
        
        .key-actions {
            display: flex; gap: 0.5rem;
        }
        .btn-key {
            padding: 0.5rem 1rem; border: none; border-radius: 8px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-active { background: #10b981; color: white; }
        .btn-block { background: #f59e0b; color: white; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-key:hover { transform: translateY(-1px); opacity: 0.9; }
        
        .generate-keys {
            padding: 2rem; background: #f8fafc; text-align: center;
            border-top: 1px solid #e2e8f0;
        }
        .btn-generate {
            background: linear-gradient(135deg, #10b981, #059669); color: white;
            border: none; padding: 1rem 3rem; border-radius: 12px; font-weight: 700;
            cursor: pointer; box-shadow: 0 10px 30px rgba(16,185,129,0.4);
        }
        
        .notification { /* Same as before */ }
        
        @media (max-width: 768px) {
            .keys-grid { grid-template-columns: 1fr; padding: 1rem; }
            .key-row { flex-direction: column; gap: 1rem; text-align: center; }
            .key-actions { justify-content: center; }
        }
        .stat-pending:hover {
    transform: translateY(-10px) !important;
    box-shadow: 0 20px 40px rgba(245, 158, 11, 0.3) !important;
}

.key-row:hover {
    background: #f1f5f9 !important;
    transform: translateX(8px);
}
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="header">
        <h1><i class="fas fa-key"></i> Key Manager</h1>
        <a href="seller-dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon" style="color: #3b82f6;"><i class="fas fa-key"></i></div>
            <div class="stat-number" id="totalKeys" style="color: #3b82f6;">0</div>
            <div>Total Keys</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="color: #10b981;"><i class="fas fa-unlock"></i></div>
            <div class="stat-number" id="availableKeys" style="color: #10b981;">0</div>
            <div>Available Keys</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="color: #2563eb;"><i class="fas fa-lock-open"></i></div>
            <div class="stat-number" id="usedKeys" style="color: #2563eb;">0</div>
            <div>Used Keys</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="color: #dc2626;"><i class="fas fa-ban"></i></div>
            <div class="stat-number" id="blockedKeys">0</div>
            <div>Blocked Keys</div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchKeyTab('all')">
            <i class="fas fa-list"></i> All Keys
        </button>
        <button class="tab-btn" onclick="switchKeyTab('available')">
            <i class="fas fa-unlock"></i> Available
        </button>
        <button class="tab-btn" onclick="switchKeyTab('used')">
            <i class="fas fa-lock-open"></i> Used
        </button>
        <button class="tab-btn" onclick="switchKeyTab('blocked')">
            <i class="fas fa-ban"></i> Blocked
        </button>
    </div>
    
    <div id="all" class="keys-grid active"></div>
    <div id="available" class="keys-grid"></div>
    <div id="used" class="keys-grid"></div>
    <div id="blocked" class="keys-grid"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="firebase-config.js"></script>
    <script>
let currentUser = localStorage.getItem('apkUser') || 'guest';
let products = {};
let allKeys = {};
let currentTab = 'all';

window.onload = function() {
    initParticles();
    loadKeys();
};

function loadKeys() {
    console.log(' Loading keys for:', currentUser); // DEBUG
    db.ref('shop/products').orderByChild('owner').equalTo(currentUser).on('value', snapshot => {
        products = snapshot.val() || {};
        console.log(' Products loaded:', Object.keys(products).length); // DEBUG
        loadAllKeys();
    });
}

function loadAllKeys() {
    allKeys = {};
    let loadedCount = 0;
    const totalProducts = Object.keys(products).length;
    
    console.log(' Total products to check:', totalProducts); // DEBUG
    
    if (totalProducts === 0) {
        showEmptyState();
        return;
    }
    
    Object.keys(products).forEach(productId => {
        db.ref(`shop/products/${productId}`).once('value', snapshot => {
            const productData = snapshot.val();
            if (productData) {
                allKeys[productId] = {
                    product: productData,
                    keys: productData.keys || [],
                    pendingKeys: productData.keysPending || []
                };
            }
            loadedCount++;
            console.log(` Loaded product ${loadedCount}/${totalProducts}:`, productId); // DEBUG
            
            if (loadedCount === totalProducts) {
                console.log('🎉 All keys loaded:', allKeys); // DEBUG
                renderKeys();
                updateKeyStats();
            }
        });
    });
}

function renderKeys() {
    const tabs = ['all', 'available', 'used', 'blocked'];
    tabs.forEach(tab => renderTab(tab));
}

function renderTab(tab) {
    const container = document.getElementById(tab);
    container.innerHTML = '';
    
    let hasContent = false;
    
    Object.entries(allKeys).forEach(([productId, data]) => {
        const product = data.product;
        const keys = data.keys || [];
        const pendingKeys = data.pendingKeys || [];
        
        console.log(`Rendering ${product.name}:`, {pending: pendingKeys.length, active: keys.length}); // DEBUG
        
        // PENDING KEYS
        if (pendingKeys.length > 0 && (tab === 'all' || tab === 'available')) {
            hasContent = true;
            const pendingSection = createPendingSection(productId, product, pendingKeys);
            container.appendChild(pendingSection);
        }
        
        // ACTIVE KEYS
        let filteredKeys = keys;
        if (tab === 'available') filteredKeys = keys.filter(k => !k.used && !k.blocked);
        else if (tab === 'used') filteredKeys = keys.filter(k => k.used);
        else if (tab === 'blocked') filteredKeys = keys.filter(k => k.blocked);
        
        if (filteredKeys.length > 0) {
            hasContent = true;
            const activeSection = createActiveSection(productId, product, filteredKeys);
            container.appendChild(activeSection);
        }
    });
    
    if (!hasContent) {
        showEmptyTabMessage(container, tab);
    }
}

function createPendingSection(productId, product, pendingKeys) {
    const section = document.createElement('div');
    section.className = 'product-section';
    section.innerHTML = `
        <div class="product-header" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
            <div>
                <h3 style="margin: 0; font-size: 1.3rem;">${product.name}</h3>
                <div style="opacity: 0.9; font-size: 0.9rem;">${pendingKeys.length} PENDING keys</div>
            </div>
            <button class="btn-generate" onclick="approvePendingKeys('${productId}')">
                <i class="fas fa-check-double"></i> Approve All
            </button>
        </div>
        <div class="key-list">
            ${pendingKeys.map((keyText, index) => `
                <div class="key-row" style="background: #fef3c7;">
                    <span class="key-code">${keyText}</span>
                    <div>
                        <span class="key-status" style="background: #fde68a; color: #d97706;">PENDING</span>
                        <button class="btn-key btn-active" onclick="approveSingleKey('${productId}', ${index})">
                            <i class="fas fa-check"></i>
                        </button>
                        <button class="btn-key btn-delete" onclick="rejectPendingKey('${productId}', ${index})">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
    return section;
}

function createActiveSection(productId, product, filteredKeys) {
    const section = document.createElement('div');
    section.className = 'product-section';
    section.innerHTML = `
        <div class="product-header">
            <div>
                <h3 style="margin: 0; font-size: 1.3rem;">${product.name}</h3>
                <div style="opacity: 0.9; font-size: 0.9rem;">${product.keys?.length || 0} total keys</div>
            </div>
            <button class="btn-generate" onclick="generateMoreKeys('${productId}', 5)">
                +5 Keys
            </button>
        </div>
        <div class="key-list">
            ${filteredKeys.map((keyObj, index) => `
                <div class="key-row">
                    <span class="key-code">${keyObj.key}</span>
                    <div>
                        <span class="key-status ${getStatusClass(keyObj)}">${getStatusText(keyObj)}</span>
                        ${getKeyActions(productId, index, keyObj)}
                    </div>
                </div>
            `).join('')}
        </div>
    `;
    return section;
}

function getStatusClass(keyObj) {
    if (keyObj.blocked) return 'status-blocked';
    if (keyObj.used) return 'status-used';
    return 'status-available';
}

function getStatusText(keyObj) {
    if (keyObj.blocked) return 'BLOCKED';
    if (keyObj.used) return `USED ${keyObj.usedBy || ''}`;
    return 'AVAILABLE';
}

function getKeyActions(productId, index, keyObj) {
    let actions = '';
    if (!keyObj.used && !keyObj.blocked) {
        actions += `<button class="btn-key btn-block" onclick="blockKey('${productId}', ${index})"><i class="fas fa-ban"></i></button>`;
    } else if (keyObj.blocked) {
        actions += `<button class="btn-key btn-active" onclick="activateKey('${productId}', ${index})"><i class="fas fa-play"></i></button>`;
    }
    actions += `<button class="btn-key btn-delete" onclick="deleteKey('${productId}', ${index})"><i class="fas fa-trash"></i></button>`;
    return actions;
}

// ALL KEY ACTIONS
function approvePendingKeys(productId) {
    const pendingCount = allKeys[productId]?.pendingKeys?.length || 0;
    if (!confirm(`Approve all ${pendingCount} pending keys?`)) return;
    
    db.ref(`shop/products/${productId}`).transaction(product => {
        if (product?.keysPending?.length > 0) {
            const newKeys = product.keysPending.map(keyText => ({
                key: keyText.trim(),
                used: false,
                usedBy: null,
                usedAt: null,
                blocked: false,
                createdAt: Date.now()
            }));
            product.keys = [...(product.keys || []), ...newKeys];
            product.totalKeys = product.keys.length;
            product.keysPending = [];
            product.totalKeysPending = 0;
            return product;
        }
    }).then(() => {
        showNotification(' All pending keys approved!', 'success');
        loadAllKeys();
    });
}

function approveSingleKey(productId, pendingIndex) {
    db.ref(`shop/products/${productId}`).transaction(product => {
        if (product?.keysPending?.[pendingIndex]) {
            const newKey = {
                key: product.keysPending[pendingIndex].trim(),
                used: false,
                usedBy: null,
                usedAt: null,
                blocked: false,
                createdAt: Date.now()
            };
            product.keys.push(newKey);
            product.keysPending.splice(pendingIndex, 1);
            product.totalKeys = product.keys.length;
            product.totalKeysPending = product.keysPending.length;
            return product;
        }
    }).then(() => {
        showNotification(' Key approved!', 'success');
        loadAllKeys();
    });
}

function rejectPendingKey(productId, pendingIndex) {
    db.ref(`shop/products/${productId}`).transaction(product => {
        if (product?.keysPending?.[pendingIndex]) {
            product.keysPending.splice(pendingIndex, 1);
            product.totalKeysPending = product.keysPending.length;
            return product;
        }
    }).then(() => {
        showNotification('Pending key rejected!', 'success');
        loadAllKeys();
    });
}

function blockKey(productId, keyIndex) {
    db.ref(`shop/products/${productId}/keys/${keyIndex}`).update({blocked: true}).then(() => {
        showNotification(' Key blocked!', 'success');
        loadAllKeys();
    });
}

function activateKey(productId, keyIndex) {
    db.ref(`shop/products/${productId}/keys/${keyIndex}`).update({blocked: false}).then(() => {
        showNotification('Key activated!', 'success');
        loadAllKeys();
    });
}

function deleteKey(productId, keyIndex) {
    db.ref(`shop/products/${productId}/keys/${keyIndex}`).remove().then(() => {
        showNotification('🗑️ Key deleted!', 'success');
        loadAllKeys();
    });
}

function generateMoreKeys(productId, count) {
    db.ref(`shop/products/${productId}`).transaction(product => {
        const newKeys = [];
        for (let i = 0; i < count; i++) {
            newKeys.push({
                key: `${product.name.toUpperCase().slice(0,4)}${Date.now()}${Math.random().toString(36).substr(2,4).toUpperCase()}${i+1}`,
                used: false,
                usedBy: null,
                usedAt: null,
                blocked: false,
                createdAt: Date.now()
            });
        }
        product.keys = [...(product.keys || []), ...newKeys];
        product.totalKeys = product.keys.length;
        return product;
    }).then(() => {
        showNotification(`${count} new keys generated!`, 'success');
        loadAllKeys();
    });
}

function switchKeyTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`[onclick="switchKeyTab('${tab}')"]`).classList.add('active');
    document.querySelectorAll('.keys-grid').forEach(grid => grid.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    renderTab(tab);
}

function updateKeyStats() {
    let total = 0, available = 0, used = 0, blocked = 0, pending = 0;
    Object.values(allKeys).forEach(data => {
        data.keys.forEach(key => {
            total++;
            if (!key.used && !key.blocked) available++;
            else if (key.used) used++;
            else if (key.blocked) blocked++;
        });
        pending += data.pendingKeys.length;
    });
    document.getElementById('totalKeys').textContent = total;
    document.getElementById('availableKeys').textContent = available;
    document.getElementById('usedKeys').textContent = used;
    document.getElementById('blockedKeys').textContent = blocked;
}

function showEmptyTabMessage(container, tab) {
    container.innerHTML = `
        <div style="text-align: center; padding: 6rem 2rem; color: #64748b;">
            <i class="fas fa-${tab === 'available' ? 'unlock' : tab === 'used' ? 'lock-open' : 'ban'}" style="font-size: 5rem; margin-bottom: 2rem;"></i>
            <h3 style="font-size: 2rem;">No ${tab} keys</h3>
            <p>Upload products first!</p>
        </div>
    `;
}

function showEmptyState() {
    document.querySelectorAll('.keys-grid').forEach(grid => {
        grid.innerHTML = `
            <div style="text-align: center; padding: 6rem 2rem; color: #64748b;">
                <i class="fas fa-key" style="font-size: 5rem; margin-bottom: 2rem;"></i>
                <h3 style="font-size: 2rem;">No products found</h3>
                <a href="shop.html" style="background: #10b981; color: white; padding: 1rem 2rem; border-radius: 12px; text-decoration: none;">
                    Upload Product
                </a>
            </div>
        `;
    });
}

function showNotification(message, type = 'success') {
    const notif = document.createElement('div');
    notif.style.cssText = `
        position: fixed; top: 20px; right: 20px; background: ${type === 'success' ? '#10b981' : '#ef4444'};
        color: white; padding: 1rem 1.5rem; border-radius: 8px; z-index: 10001;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    `;
    notif.textContent = message;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

function initParticles() {
    if (typeof particlesJS !== 'undefined') {
        particlesJS('particles-js', {particles: {number: {value: 80}, color: {value: ['#10b981', '#3b82f6']}}});
    }
}
</script>
</body>
</html>
